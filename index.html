<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .action-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            text-align: center;
            line-height: 1.4;
        }
        .action-zone:active { opacity: 0.7; }
        .action-zone.disabled { opacity: 0.5; pointer-events: none; }

        .top-zone { background: #7c3aed; color: white; }
        .video-container { height: 35vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        .flash.active { opacity: 1; }
        .bottom-zone { background: #00d4ff; color: #1a1a2e; }
    </style>
</head>
<body>
    <h1 style="text-align: center; padding: 10px;">視覺助理</h1>

    <div id="topZone" class="action-zone top-zone disabled">
        <span id="topText">正在讀取設定...</span>
    </div>

    <div class="video-container" id="videoContainer">
        <video id="video" autoplay playsinline></video>
        <div id="flash" class="flash"></div>
    </div>

    <div id="bottomZone" class="action-zone bottom-zone">
        <span id="bottomText">拍 照</span>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const flash = document.getElementById('flash');
        const topZone = document.getElementById('topZone');
        const topText = document.getElementById('topText');
        const bottomZone = document.getElementById('bottomZone');

        let capturedImage = null;
        let lastResponse = '';
        let apiKey = '';
        let needNewRecognition = false;
        const fileId = '1j_xerlVByCrLrYVSFnqhzfdwk9x8IqaX';
        const modelName = 'gemini-2.5-flash'; // 請確保模型名稱正確
        const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
        
        // 讀取設定檔
        async function loadConfig() {
            try {
                const response = await fetch(url);
                const config = await response.json();
                apiKey = config.apiKey;
                topText.innerHTML = "辨識並朗讀";
                topZone.classList.add('disabled'); // 初始化時鎖定，直到拍照
            } catch (err) {
                topText.innerHTML = "讀取設定檔失敗";
                console.error(err);
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
        }

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) {
                speak('相機啟動失敗');
            }
        }

        bottomZone.addEventListener('click', () => {
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 100);
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            needNewRecognition = true;
            topZone.classList.remove('disabled');
            topText.innerHTML = "辨識並朗讀";
            speak('已拍照，點擊上方進行辨識');
        });

        topZone.addEventListener('click', async () => {
            if (!apiKey) return speak('API Key 未設定');
            
            topZone.classList.add('disabled');
            topText.innerHTML = "分析中...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "這張圖片裡有什麼？請用繁體中文回答，簡短一兩句話。" }, { inline_data: { mime_type: 'image/jpeg', data: capturedImage.split(',')[1] } }] }]
                    })
                });
                const data = await response.json();
                lastResponse = data.candidates[0].content.parts[0].text;
                topText.innerHTML = "再次朗讀結果";
                speak(lastResponse);
            } catch (err) {
                topText.innerHTML = "辨識失敗";
            } finally {
                topZone.classList.remove('disabled');
            }
        });

        loadConfig();
        initWebcam();
    </script>
</body>
</html>
