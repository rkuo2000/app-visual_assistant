<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; color: #00d4ff; font-size: 24px; }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 340px; 
            width: 100%;
            align-items: center;
        }

        .video-container {
            background: #16213e;
            border-radius: 12px;
            padding: 10px;
            width: 200px;      
            height: 150px;     
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 8px;
            background: #0f0f23;
        }

        .controls {
            display: flex;
            flex-direction: column; 
            gap: 12px;
            margin: 10px 0;
            width: 100%;
        }

        button {
            padding: 20px 20px; 
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 24px;    
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #captureBtn { background: #00d4ff; color: #1a1a2e; }
        #askBtn { background: #7c3aed; color: white; }
        #speakBtn { background: #0ea5e9; color: white; }

        button:hover { transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .api-key-container {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: #16213e;
            border-radius: 12px;
            font-size: 14px;
        }
        .api-key-container label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
        }
        .api-key-container input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #0f0f23;
            color: white;
        }
        .get-api-key-btn {
            display: inline-block;
            margin-top: 10px;
            color: #4285f4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>視覺助理</h1>
    
    <div class="container">
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div class="controls">
            <button id="captureBtn">拍照</button>
            <button id="askBtn" disabled>辨識</button>
            <button id="speakBtn" disabled>🔊 朗讀</button>
        </div>

        <div class="api-key-container">
            <label for="apiKey">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="在此輸入 Key">
            <a href="https://aistudio.google.com/api-keys" target="_blank" class="get-api-key-btn">點此獲取 Key</a>	
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const askBtn = document.getElementById('askBtn');
        const speakBtn = document.getElementById('speakBtn');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;
        let lastResponse = '';
        let apiKey = '';
        const modelName = 'gemini-2.5-flash'; // 修正為目前可用的正確模型名稱

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
        }

        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
				speak('相機就緒');
            } catch (err) {
				speak('相機啟動失敗，請檢查權限');
            }
        }

        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            askBtn.disabled = false;
            speak('照片已擷取，請按辨識');
        });

        apiKeyInput.addEventListener('input', (e) => {
            apiKey = e.target.value.trim();
        });

        async function askGemini() {
            if (!apiKey) {
                speak('請先輸入 API 密鑰');
                return;
            }
            if (!capturedImage) {
                speak('請先拍照');
                return;
            }
            
            askBtn.disabled = true;
            captureBtn.disabled = true;
            speak('正在分析');

            const base64Data = capturedImage.split(',')[1];
            const payload = {
                contents: [{
                    parts: [
                        { text: "這張圖片裡有什麼？請用繁體中文回答，簡短一兩句話。" },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法識別內容';
                
                speak(lastResponse);
                speakBtn.disabled = false;

            } catch (err) {
                speak('辨識過程發生錯誤');
            } finally {
                askBtn.disabled = false;
                captureBtn.disabled = false;
            }
        }

        askBtn.addEventListener('click', askGemini);
        speakBtn.addEventListener('click', () => speak(lastResponse));
        initWebcam();
    </script>
</body>
</html>
