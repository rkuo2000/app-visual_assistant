<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止滾動 */
        }

        /* 頂部 API Key 區塊 (縮小並置頂) */
        .api-key-container {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #0f0f23;
            gap: 10px;
            z-index: 10;
        }
        .api-key-container input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #16213e;
            color: white;
        }
        .get-api-key-btn {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }

        /* 互動區域共用樣式 */
        .action-zone {
            flex: 1; /* 自動填滿剩餘空間 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            text-align: center;
            line-height: 1.4;
        }
        .action-zone:active { opacity: 0.7; }
        .action-zone.disabled { opacity: 0.5; pointer-events: none; }

        /* 上方區域：辨識與朗讀 */
        .top-zone {
            background: #7c3aed;
            color: white;
        }

        /* 中間：照片視窗 */
        .video-container {
            height: 35vh; /* 佔據畫面 35% 高度 */
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 5;
        }
        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保畫面完整顯示不被裁切 */
        }
        /* 拍照時的閃光效果 */
        .flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
        }
        .flash.active { opacity: 1; transition: none; }

        /* 下方區域：拍照 */
        .bottom-zone {
            background: #00d4ff;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">視覺助理</h1>

    <!-- 上方區域：辨識與朗讀 -->
    <div id="topZone" class="action-zone top-zone disabled">
        <span id="topText">辨識並朗讀</span>
    </div>

    <!-- 中間區域：照片視窗 -->
    <div class="video-container" id="videoContainer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="flash" class="flash"></div>
    </div>

    <!-- 下方區域：拍照 -->
    <div id="bottomZone" class="action-zone bottom-zone">
        <span id="bottomText">拍 照</span>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const flash = document.getElementById('flash');
        const topZone = document.getElementById('topZone');
        const topText = document.getElementById('topText');
        const bottomZone = document.getElementById('bottomZone');
        const bottomText = document.getElementById('bottomText');
        const apiKeyInput = document.getElementById('apiKey');

        let capturedImage = null;
        let lastResponse = '';
        let apiKey = '';
        let needNewRecognition = false; // 判斷是否需要重新辨識
        const modelName = 'gemini-2.5-flash';

        fetch('./config.json')
          .then(response => response.json())
          .then(data => console.log(data.apiKey))
          .catch(error => console.error('Error:', error));		
        apiKey = data.apiKey;
		
        // 語音合成
        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);
        }

        // 初始化相機
        async function initWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                speak('視覺助理已啟動，請點擊畫面下方拍照');
            } catch (err) {
                speak('相機啟動失敗，請檢查權限');
                bottomText.innerHTML = "相機啟動失敗";
            }
        }

        // 下方區域點擊：拍照
        bottomZone.addEventListener('click', () => {
            // 觸發閃光燈效果
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 100);

            // 繪製畫面到 canvas 並轉為圖片
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            
            // 狀態更新
            needNewRecognition = true;
            topZone.classList.remove('disabled');
            topText.innerHTML = "辨識與朗讀";
            
            speak('照片已擷取，請點擊上方進行辨識');
        });

        // 上方區域點擊：辨識與朗讀
        topZone.addEventListener('click', async () => {
            if (!apiKey) {
                speak('請先在最上方輸入 API 密鑰');
                return;
            }
            if (!capturedImage) {
                speak('請先點擊下方拍照');
                return;
            }

            // 如果已經辨識過同一張照片，則直接重新朗讀結果
            if (!needNewRecognition && lastResponse) {
                speak(lastResponse);
                return;
            }
            
            // 鎖定畫面防止重複點擊
            topZone.classList.add('disabled');
            bottomZone.classList.add('disabled');
            topText.innerHTML = "正在分析中...<br>請稍候";
            speak('正在分析畫面');

            const base64Data = capturedImage.split(',')[1];
            const payload = {
                contents: [{
                    parts: [
                        { text: "這張圖片裡有什麼？請用繁體中文回答，簡短一兩句話。" },
                        { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '無法識別內容';
                
                needNewRecognition = false; // 標記為已辨識
                topText.innerHTML = "再次朗讀結果";
                speak(lastResponse);

            } catch (err) {
                speak('辨識過程發生錯誤，請檢查網路或 API Key');
                topText.innerHTML = "辨識失敗<br>請重試";
            } finally {
                // 解除鎖定
                topZone.classList.remove('disabled');
                bottomZone.classList.remove('disabled');
            }
        });

        // 啟動相機
        initWebcam();
    </script>
</body>
</html>
