<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺助理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #fileInput { display: none; }

        .config-bar {
            background: #0f0f23;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .load-btn {
            background: #444;
            color: #ccc;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 5px;
        }
        .status-dot.active { background: #00ff00; }

        .action-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            text-align: center;
            line-height: 1.4;
        }
        .action-zone:active { opacity: 0.7; }
        .action-zone.disabled { opacity: 0.5; pointer-events: none; }

        .top-zone { background: #7c3aed; color: white; }

        .video-container {
            height: 40vh;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video, canvas { width: 100%; height: 100%; object-fit: contain; }

        .flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white; opacity: 0; pointer-events: none;
        }
        .flash.active { opacity: 1; }

        .bottom-zone { background: #00d4ff; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="config-bar">
        <div style="font-size: 12px;">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">正在檢查設定...</span>
        </div>
        <button class="load-btn" onclick="document.getElementById('fileInput').click()">手動讀取</button>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <div id="topZone" class="action-zone top-zone disabled">
        <span id="topText">辨識並朗讀</span>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="flash" class="flash"></div>
    </div>

    <div id="bottomZone" class="action-zone bottom-zone">
        <span id="bottomText">拍 照</span>
    </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const flash = document.getElementById('flash');
const topZone = document.getElementById('topZone');
const topText = document.getElementById('topText');
const bottomZone = document.getElementById('bottomZone');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const fileInput = document.getElementById('fileInput');

let capturedImage = null;
let lastResponse = '';
let apiKey = localStorage.getItem('gemini_api_key') || '';
let needNewRecognition = false;
// 建議使用更穩定的模型版本路徑
const modelName = 'gemini-2.5-flash'; 

window.addEventListener('load', () => {
    initWebcam();
    autoLoadConfig();
});

async function autoLoadConfig() {
    if (apiKey) {
        updateKeyStatus(true);
        return;
    }
    try {
        const response = await fetch('config.json');
        if (response.ok) {
            const config = await response.json();
            if (config.apiKey) {
                saveKey(config.apiKey);
                updateKeyStatus(true, "自動載入成功");
                speak('已自動載入設定檔');
            }
        }
    } catch (e) {
        updateKeyStatus(false);
    }
}

function saveKey(key) {
    apiKey = key;
    localStorage.setItem('gemini_api_key', key);
}

function updateKeyStatus(hasKey, message) {
    if (hasKey) {
        statusDot.classList.add('active');
        statusText.innerText = message || "API Key 已就緒";
    } else {
        statusDot.classList.remove('active');
        statusText.innerText = "請讀取 config.json";
    }
}

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const config = JSON.parse(event.target.result);
            if (config.apiKey) {
                saveKey(config.apiKey);
                updateKeyStatus(true, "載入成功");
                speak('設定檔載入成功');
            }
        } catch (err) {
            speak('設定檔格式錯誤');
        }
    };
    reader.readAsText(file);
});

function speak(text) {
    if (!text) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-TW';
    window.speechSynthesis.speak(utterance);
}

async function initWebcam() {
    try {
        // 優化設定：請求更高的解析度
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;
    } catch (err) {
        console.error(err);
        speak('相機啟動失敗，請確保使用 HTTPS 環境');
    }
}

bottomZone.addEventListener('click', () => {
    // 確保影片已經有寬度高度（避免拍到黑畫面）
    if (video.videoWidth === 0) {
        speak('相機準備中，請稍候');
        return;
    }

    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 100);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    // 轉換成 Base64
    capturedImage = canvas.toDataURL('image/jpeg', 0.8);
    needNewRecognition = true;
    topZone.classList.remove('disabled');
    topText.innerHTML = "辨識並朗讀";
    speak('已拍照');
});

topZone.addEventListener('click', async () => {
    if (!apiKey) { speak('請先讀取設定檔'); return; }
    if (!capturedImage) { speak('請先拍照'); return; }
    if (!needNewRecognition && lastResponse) { speak(lastResponse); return; }
    
    topZone.classList.add('disabled');
    topText.innerHTML = "分析中...";
    speak('正在分析');

    const base64Data = capturedImage.split(',')[1];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

    const payload = {
        contents: [{
            parts: [
                { text: "這張圖片裡有什麼？請用繁體中文回答，簡短一兩句話。" },
                { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
            ]
        }]
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        // 檢查 API 是否回傳錯誤訊息
        if (data.error) {
            console.error("API Error:", data.error);
            throw new Error(data.error.message);
        }

        lastResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || '辨識不到內容';
        needNewRecognition = false;
        topText.innerHTML = "再次朗讀";
        speak(lastResponse);
    } catch (err) {
        console.error("Fetch Error:", err);
        speak('辨識失敗，請檢查網路或 API 金鑰');
        topText.innerHTML = "重試";
    } finally {
        topZone.classList.remove('disabled');
    }
});
</script>
</body>
</html>
